name: Daily ETF Holdings Scraper

# 設定觸發條件
on:
  schedule:
    # 這是 UTC 時間 10:00，等於台灣時間 (CST) 18:00
    # 1-5 代表週一到週五執行
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # 允許您隨時在 GitHub 網頁上點擊按鈕手動測試

# 賦予 GitHub Actions 寫入權限，才能把爬完的 data.json 推送回倉庫
permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      # 1. 取得最新程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 建立 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      # 3. 安裝 requirements.txt 內的依賴套件並執行爬蟲
      - name: Install dependencies and run script
        run: |
          pip install -r requirements.txt
          python scripts/update_00981a_data.py

      # 4. 把產生/更新的 public/data.json Commit 並 Push 回去
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # 如果資料沒變 (例如假日或沒換股)，就不會產生錯誤，直接 echo 略過
          git commit -m "update: fetch latest 00981a holdings data" || echo "No changes to commit"
          git push